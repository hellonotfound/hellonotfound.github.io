name: CI - Build & Test

on:
  push:
    branches: ["master"]

  workflow_dispatch:

jobs:
  build:
    # Build job, omitted
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
